# Three resolver microservices (same /resolve + /health API).
# Default ports: didwebvh-rs 8081, didwebvh-py 8082, didwebvh-ts 8083.
services:
  resolver-didwebvh-rs:
    build: ./resolvers/didwebvh-rs
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"

  resolver-didwebvh-py:
    build: ./resolvers/didwebvh-py
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"

  resolver-didwebvh-ts:
    build: ./resolvers/didwebvh-ts
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - resolver-didwebvh-rs
      - resolver-didwebvh-py
      - resolver-didwebvh-ts
    environment:
      ENGINE_RS_HOST: resolver-didwebvh-rs
      ENGINE_RS_PORT: "8081"
      ENGINE_PY_HOST: resolver-didwebvh-py
      ENGINE_PY_PORT: "8082"
      ENGINE_TS_HOST: resolver-didwebvh-ts
      ENGINE_TS_PORT: "8083"
